<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>

    <style>
        /* Center the login box */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f2f2f2;
            font-family: Arial, sans-serif;
        }

        /* Login box styling */
        .login-box {
            background-color: white;
            padding: 30px;
            border: 2px solid #ccc;
            border-radius: 10px;
            width: 300px;
            text-align: center;
        }

        /* Heading */
        h2 {
            margin-bottom: 20px;
        }

        /* Input fields */
        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        /* Button styling */
        button {
            width: 100%;
            padding: 10px;
            background-color: blue;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: darkblue;
        }
    </style>

</head>
<body>

    
    <div class="login-box">

        <h3>Name: Samarth Bhatnagar</h3>
        <h3>Reg No: 24BCI0082</h3>

        <h2>Login</h2>

        <input type="text" placeholder="Username"><br>
        <input type="password" placeholder="Password"><br>

        <button>Login</button>

    </div>

</body>
</html>
